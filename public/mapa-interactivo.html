<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mapa interactivo de humedales · SIIA Valparaíso</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{--nav:#0b3d66;--ink:#12303f}
  html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink)}
  #map{position:absolute;inset:52px 0 0 0}
  nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:10;display:flex;gap:16px;
    align-items:center;padding:0 18px;background:var(--nav);color:#fff;box-sizing:border-box;
    box-shadow:0 2px 8px rgba(0,0,0,.15)}
  nav strong{letter-spacing:.04em} nav a{color:#cfe6f2;text-decoration:none;font-size:.9rem}
  nav a:hover{color:#fff}
  .panel{position:absolute;top:66px;left:12px;z-index:5;background:rgba(255,255,255,.96);
    border-radius:12px;padding:12px 14px;box-shadow:0 6px 18px rgba(0,0,0,.18);max-width:238px}
  .panel h1{font-size:.95rem;margin:0 0 2px} .panel p{font-size:.76rem;color:#557;margin:0 0 8px}
  .btns{display:flex;flex-wrap:wrap;gap:6px}
  .btns button{border:1px solid #cdd7e0;background:#fff;color:var(--ink);border-radius:999px;
    padding:5px 10px;font-size:.78rem;cursor:pointer}
  .btns button.on{background:var(--nav);color:#fff;border-color:var(--nav)}
  .base{margin-top:10px;display:flex;gap:6px}
  .base button{flex:1;border:1px solid #cdd7e0;background:#fff;border-radius:8px;padding:4px;
    font-size:.74rem;cursor:pointer} .base button.on{background:#12303f;color:#fff;border-color:#12303f}
  .legend{position:absolute;bottom:16px;left:12px;z-index:5;background:rgba(255,255,255,.96);
    border-radius:10px;padding:10px 12px;box-shadow:0 6px 18px rgba(0,0,0,.18);font-size:.78rem;
    max-height:44vh;overflow:auto;max-width:250px}
  .legend b{display:block;margin-bottom:6px;font-size:.8rem}
  .row{display:flex;align-items:center;gap:7px;margin:2px 0}
  .sw{width:14px;height:14px;border-radius:3px;display:inline-block;border:1px solid rgba(0,0,0,.15);flex:none}
  .maplibregl-popup-content{font-size:.8rem;line-height:1.4;padding:10px 12px;border-radius:8px}
  .maplibregl-popup-content b{color:var(--nav)}
</style>
</head>
<body>
<nav>
  <strong>SIIA · Valparaíso</strong>
  <a href="/">← Informe</a>
  <a href="/modelo-3d.html">Modelo 3D</a>
  <span style="margin-left:auto;font-size:.8rem;opacity:.85">Mapa interactivo de humedales</span>
</nav>
<div class="panel">
  <h1>Humedales de Valparaíso</h1>
  <p>2.916 humedales del inventario MMA. Clic en un punto para ver su ficha. Colorear por:</p>
  <div class="btns" id="btns"></div>
  <div class="base"><button data-b="claro" class="on">Claro</button><button data-b="sat">Satélite</button></div>
</div>
<div class="legend" id="legend"></div>
<div id="map"></div>
<script>
const CUENCAS=[["Rio Aconcagua","#4e79a7"],["Costeras entre Aconcagua y Maipo","#59a14f"],
  ["Costeras Ligua-Aconcagua","#f28e2b"],["Rio Petorca","#e15759"],["Rio Ligua","#b07aa1"],
  ["Rio Maipo","#76b7b2"],["Rio Choapa","#edc948"],["Costeras entre R.Choapa y R.Quilimari","#ff9da7"],
  ["Rio QuiLimari","#9c755f"],["Costeras Quilimari-Petorca","#bab0ac"],
  ["Costeras entre  Maipo y Rapel","#86bcb6"],["Rio Rapel","#d37295"]];
const VARS={
  p:{label:"Percentil empírico",type:"grad",
     stops:[[50,"#ffffcc"],[70,"#a1dab4"],[85,"#41b6c4"],[95,"#2c7fb8"],[100,"#253494"]],
     fmt:v=>"P"+v.toFixed(0),leg:"Percentil del acumulado (registro 1995–2025)"},
  cl:{label:"Amenaza de inundación",type:"cat",
     cats:[["Muy Baja","#2c7bb6"],["Baja","#abd9e9"],["Moderada","#ffffbf"],["Alta","#fdae61"],["Muy Alta","#d7191c"]],
     leg:"Clase de amenaza (exposición × susceptibilidad)"},
  s:{label:"Susceptibilidad",type:"grad",
     stops:[[0,"#f7fcf0"],[0.2,"#bae4bc"],[0.4,"#7bccc4"],[0.55,"#2b8cbe"],[0.7,"#084081"]],
     fmt:v=>v.toFixed(2),leg:"Susceptibilidad de inundación (terreno + suelo + ríos)"},
  su:{label:"Retención del suelo",type:"grad",
     stops:[[0,"#f6e8c3"],[0.35,"#dfc27d"],[0.5,"#80cdc1"],[0.7,"#35978f"],[1,"#01665e"]],
     fmt:v=>v.toFixed(2),leg:"Retención hídrica del suelo (CIREN + HWSD2)"},
  cu:{label:"Cuenca",type:"basin",cats:CUENCAS,leg:"Cuenca hidrográfica (BNA) — polígonos"},
};
const ORDER=["p","cl","s","su","cu"];
let current="p";

const map=new maplibregl.Map({container:"map",
  style:{version:8,sources:{
    claro:{type:"raster",tileSize:256,attribution:"© OpenStreetMap · © CARTO",
      tiles:["https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",
             "https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",
             "https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png"]},
    sat:{type:"raster",tileSize:256,attribution:"Esri, Maxar, Earthstar Geographics",
      tiles:["https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"]}},
    layers:[{id:"claro",type:"raster",source:"claro"},
            {id:"sat",type:"raster",source:"sat",layout:{visibility:"none"}}]},
  center:[-71.05,-32.9],zoom:7.4});
map.addControl(new maplibregl.NavigationControl(),"top-right");
map.addControl(new maplibregl.ScaleControl({unit:"metric"}),"bottom-right");

function gradExpr(k){const V=VARS[k];const e=["interpolate",["linear"],["coalesce",["get",k],-1],-1,"#d9d9d9"];
  V.stops.forEach(([v,c])=>e.push(v,c));return e;}
function catExpr(k,cats){const e=["match",["coalesce",["get",k],"?"]];cats.forEach(([v,c])=>e.push(v,c));e.push("#bbb");return e;}
function pointColor(k){
  if(k==="cu") return "#20303c";                      // en modo cuenca los puntos van neutros
  if(VARS[k].type==="grad") return gradExpr(k);
  return catExpr(k,VARS[k].cats);
}

function setVar(k){
  current=k;
  map.setPaintProperty("hum","circle-color",pointColor(k));
  map.setPaintProperty("hum","circle-radius",k==="cu"
    ? ["interpolate",["linear"],["zoom"],6,1.6,9,3,12,6]
    : ["interpolate",["linear"],["zoom"],6,2.2,9,4.5,12,9]);
  const vis=k==="cu"?"visible":"none";
  map.setLayoutProperty("cuencas-fill","visibility",vis);
  map.setLayoutProperty("cuencas-line","visibility",vis);
  document.querySelectorAll("#btns button").forEach(b=>b.classList.toggle("on",b.dataset.k===k));
  drawLegend(k);
}
function drawLegend(k){
  const V=VARS[k];let h="<b>"+V.leg+"</b>";
  if(V.type==="cat"||V.type==="basin"){
    V.cats.forEach(([v,c])=>h+=`<div class="row"><span class="sw" style="background:${c}"></span>${v}</div>`);
    if(V.type==="cat") h+=`<div class="row"><span class="sw" style="background:#bbb"></span>sin dato</div>`;
  }else V.stops.forEach(([v,c])=>h+=`<div class="row"><span class="sw" style="background:${c}"></span>${V.fmt(v)}</div>`);
  document.getElementById("legend").innerHTML=h;
}
const bt=document.getElementById("btns");
ORDER.forEach(k=>{const b=document.createElement("button");b.textContent=VARS[k].label;b.dataset.k=k;b.onclick=()=>setVar(k);bt.appendChild(b);});
document.querySelectorAll(".base button").forEach(b=>b.onclick=()=>{
  const sat=b.dataset.b==="sat";
  map.setLayoutProperty("sat","visibility",sat?"visible":"none");
  map.setLayoutProperty("claro","visibility",sat?"none":"visible");
  document.querySelectorAll(".base button").forEach(x=>x.classList.toggle("on",x===b));
});

map.on("load",()=>{
  map.addSource("cu",{type:"geojson",data:"/cuencas.geojson"});
  map.addLayer({id:"cuencas-fill",type:"fill",source:"cu",layout:{visibility:"none"},
    paint:{"fill-color":catExpr("NOM_CUEN",CUENCAS),"fill-opacity":0.38}});
  map.addLayer({id:"cuencas-line",type:"line",source:"cu",layout:{visibility:"none"},
    paint:{"line-color":"#33475a","line-width":0.8,"line-opacity":0.7}});
  map.addSource("h",{type:"geojson",data:"/humedales.geojson"});
  map.addLayer({id:"hum",type:"circle",source:"h",
    paint:{"circle-color":pointColor(current),
      "circle-radius":["interpolate",["linear"],["zoom"],6,2.2,9,4.5,12,9],
      "circle-opacity":0.9,"circle-stroke-width":0.4,"circle-stroke-color":"rgba(20,40,60,.5)"}});
  setVar("p");
  const pop=new maplibregl.Popup({closeButton:true,maxWidth:"260px"});
  map.on("click","hum",e=>{const p=e.features[0].properties;
    pop.setLngLat(e.lngLat).setHTML(
      `<b>${p.n}</b><br>${p.c}${p.cu?" · "+p.cu:""}<br>`+
      `Percentil: <b>P${(+p.p).toFixed(0)}</b> · Acumulado ${(+p.mm).toFixed(0)} mm<br>`+
      `Amenaza de inundación: <b>${p.cl}</b><br>`+
      `Susceptibilidad ${(+p.s).toFixed(2)} · Retención suelo ${p.su!=null?(+p.su).toFixed(2):"s/d"}`
    ).addTo(map);});
  map.on("mouseenter","hum",()=>map.getCanvas().style.cursor="pointer");
  map.on("mouseleave","hum",()=>map.getCanvas().style.cursor="");
});
</script>
</body>
</html>
