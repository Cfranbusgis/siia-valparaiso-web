<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mapa interactivo de humedales · SIIA Valparaíso</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{--nav:#0b3d66;--ink:#12303f}
  html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink)}
  #map{position:absolute;inset:52px 0 0 0}
  nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:10;display:flex;gap:16px;align-items:center;
    padding:0 18px;background:var(--nav);color:#fff;box-sizing:border-box;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  nav strong{letter-spacing:.04em} nav a{color:#cfe6f2;text-decoration:none;font-size:.9rem} nav a:hover{color:#fff}
  .card{position:absolute;z-index:5;background:rgba(255,255,255,.97);border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,.18);font-size:.8rem}
  .panel{top:66px;left:12px;max-width:246px}
  .legend{bottom:16px;left:12px;max-height:44vh;overflow:auto;max-width:250px}
  .head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;cursor:pointer;
    font-weight:700;font-size:.85rem;color:var(--nav);user-select:none}
  .head .min{border:none;background:#eef2f6;color:var(--nav);border-radius:6px;width:22px;height:22px;
    font-size:1rem;line-height:1;cursor:pointer}
  .body{padding:0 12px 12px}
  .collapsed .body{display:none}
  .lbl{font-weight:700;margin:9px 0 4px;font-size:.76rem;color:#33475a}
  .chk{display:flex;align-items:center;gap:6px;margin:2px 0} .chk input{accent-color:var(--nav)}
  .lyr{margin:4px 0} .op{width:100%;height:4px;accent-color:var(--nav);margin:1px 0 4px;cursor:pointer}
  .dl a{display:block;color:var(--nav);text-decoration:none;padding:2px 0;font-size:.76rem} .dl a:hover{text-decoration:underline}
  .btns{display:flex;flex-wrap:wrap;gap:5px}
  .btns button{border:1px solid #cdd7e0;background:#fff;color:var(--ink);border-radius:999px;padding:4px 9px;font-size:.76rem;cursor:pointer}
  .btns button.on{background:var(--nav);color:#fff;border-color:var(--nav)}
  .base{display:flex;gap:6px}
  .base button{flex:1;border:1px solid #cdd7e0;background:#fff;border-radius:8px;padding:4px;font-size:.74rem;cursor:pointer}
  .base button.on{background:#12303f;color:#fff;border-color:#12303f}
  .row{display:flex;align-items:center;gap:7px;margin:2px 0}
  .sw{width:14px;height:14px;border-radius:3px;display:inline-block;border:1px solid rgba(0,0,0,.15);flex:none}
  .maplibregl-popup-content{font-size:.8rem;line-height:1.4;padding:10px 12px;border-radius:8px}
  .maplibregl-popup-content b{color:var(--nav)}
</style>
</head>
<body>
<nav>
  <strong>SIIA · Valparaíso</strong>
  <a href="/">← Informe</a>
  <a href="/modelo-3d.html">Modelo 3D</a>
  <span style="margin-left:auto;font-size:.8rem;opacity:.85">Mapa interactivo de humedales</span>
</nav>
<div class="card panel" id="panel">
  <div class="head" id="phead"><span>Controles</span><button class="min" id="pmin">–</button></div>
  <div class="body">
    <div class="lbl">Capas (superponibles)</div>
    <div id="layers"></div>
    <div class="lbl">Colorear humedales por</div>
    <div class="btns" id="btns"></div>
    <div class="lbl">Mapa base</div>
    <div class="base"><button data-b="claro" class="on">Claro</button><button data-b="sat">Satélite</button></div>
    <input type="range" class="op" id="baseop" min="0" max="100" value="100" title="Transparencia del mapa base">
    <div class="lbl">Datos y metadatos</div>
    <div class="dl">
      <a href="/humedales_tabla.csv" download>⬇ Tabla de humedales (CSV, 2.916)</a>
      <a href="/humedales_poly.geojson" download>⬇ Humedales (GeoJSON)</a>
      <a href="/cuencas.geojson" download>⬇ Cuencas (GeoJSON)</a>
    </div>
  </div>
</div>
<div class="card legend" id="legend">
  <div class="head" id="lhead"><span>Leyenda</span><button class="min" id="lmin">–</button></div>
  <div class="body" id="legendbody"></div>
</div>
<div id="map"></div>
<script>
const CUENCAS=[["Rio Aconcagua","#4e79a7"],["Costeras entre Aconcagua y Maipo","#59a14f"],
  ["Costeras Ligua-Aconcagua","#f28e2b"],["Rio Petorca","#e15759"],["Rio Ligua","#b07aa1"],
  ["Rio Maipo","#76b7b2"],["Rio Choapa","#edc948"],["Costeras entre R.Choapa y R.Quilimari","#ff9da7"],
  ["Rio QuiLimari","#9c755f"],["Costeras Quilimari-Petorca","#bab0ac"],
  ["Costeras entre  Maipo y Rapel","#86bcb6"],["Rio Rapel","#d37295"]];
const VARS={
  p:{label:"Percentil",type:"grad",stops:[[50,"#ffffcc"],[70,"#a1dab4"],[85,"#41b6c4"],[95,"#2c7fb8"],[100,"#253494"]],
     fmt:v=>"P"+v.toFixed(0),leg:"Percentil empírico del acumulado (1995–2025)"},
  cl:{label:"Amenaza",type:"cat",cats:[["Muy Baja","#2c7bb6"],["Baja","#abd9e9"],["Moderada","#ffffbf"],["Alta","#fdae61"],["Muy Alta","#d7191c"]],
     leg:"Clase de amenaza de inundación (≥ P90)"},
  s:{label:"Susceptibilidad",type:"grad",stops:[[0,"#f7fcf0"],[0.2,"#bae4bc"],[0.4,"#7bccc4"],[0.55,"#2b8cbe"],[0.7,"#084081"]],
     fmt:v=>v.toFixed(2),leg:"Susceptibilidad de inundación"},
  su:{label:"Suelo",type:"grad",stops:[[0,"#f6e8c3"],[0.35,"#dfc27d"],[0.5,"#80cdc1"],[0.7,"#35978f"],[1,"#01665e"]],
     fmt:v=>v.toFixed(2),leg:"Retención hídrica del suelo (CIREN + HWSD2)"},
};
const VORDER=["p","cl","s","su"];
let cvar="p";
const LAYERS=[["region","Región de Valparaíso",true,100],["cuencas","Cuencas (BNA)",false,35],["poly","Humedales",true,88]];
const OPTARGET={region:["region-line","line-opacity"],cuencas:["cuencas-fill","fill-opacity"],poly:["hpoly","fill-opacity"]};

const map=new maplibregl.Map({container:"map",style:{version:8,sources:{
  claro:{type:"raster",tileSize:256,attribution:"© OpenStreetMap · © CARTO",
    tiles:["https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png","https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png","https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png"]},
  sat:{type:"raster",tileSize:256,attribution:"Esri, Maxar, Earthstar Geographics",
    tiles:["https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"]}},
  layers:[{id:"claro",type:"raster",source:"claro"},{id:"sat",type:"raster",source:"sat",layout:{visibility:"none"}}]},
  center:[-71.05,-32.9],zoom:7.4});
map.addControl(new maplibregl.NavigationControl(),"top-right");
map.addControl(new maplibregl.ScaleControl({unit:"metric"}),"bottom-right");

function colorExpr(k){const V=VARS[k];
  if(V.type==="grad"){const e=["interpolate",["linear"],["coalesce",["get",k],-1],-1,"#d9d9d9"];V.stops.forEach(([v,c])=>e.push(v,c));return e;}
  const e=["match",["coalesce",["get",k],"?"]];V.cats.forEach(([v,c])=>e.push(v,c));e.push("#bbb");return e;}
function setColor(k){cvar=k;
  if(map.getLayer("hpoly"))map.setPaintProperty("hpoly","fill-color",colorExpr(k));
  document.querySelectorAll("#btns button").forEach(b=>b.classList.toggle("on",b.dataset.k===k));
  drawLegend();}
function drawLegend(){const V=VARS[cvar];let h="<b>"+V.leg+"</b>";
  if(V.type==="cat"){V.cats.forEach(([v,c])=>h+=`<div class="row"><span class="sw" style="background:${c}"></span>${v}</div>`);
    h+=`<div class="row"><span class="sw" style="background:#bbb"></span>sin dato</div>`;}
  else V.stops.forEach(([v,c])=>h+=`<div class="row"><span class="sw" style="background:${c}"></span>${V.fmt(v)}</div>`);
  if(document.querySelector('input[data-l="cuencas"]').checked){h+='<b style="margin-top:8px">Cuencas</b>';
    CUENCAS.forEach(([v,c])=>h+=`<div class="row"><span class="sw" style="background:${c};opacity:.6"></span>${v}</div>`);}
  document.getElementById("legendbody").innerHTML=h;}

function setOpacity(id,val){const[l,pr]=OPTARGET[id];if(map.getLayer(l))map.setPaintProperty(l,pr,val/100);}
function setLayer(id,on){const v=on?"visible":"none";
  const ids={region:["region-line"],cuencas:["cuencas-fill","cuencas-line"],poly:["hpoly","hpoly-line"]}[id];
  ids.forEach(l=>{if(map.getLayer(l))map.setLayoutProperty(l,"visibility",v);});
  if(id==="cuencas")drawLegend();}

// minimizar tarjetas
function bindMin(cardId,btnId){const card=document.getElementById(cardId),btn=document.getElementById(btnId);
  const head=card.querySelector(".head");
  head.onclick=e=>{if(e.target.tagName==="INPUT")return;card.classList.toggle("collapsed");
    btn.textContent=card.classList.contains("collapsed")?"+":"–";};}
bindMin("panel","pmin"); bindMin("legend","lmin");

const lay=document.getElementById("layers");
LAYERS.forEach(([id,txt,on,op])=>{const w=document.createElement("div");w.className="lyr";
  w.innerHTML=`<label class="chk"><input type="checkbox" data-l="${id}" ${on?"checked":""}> ${txt}</label>`+
    `<input type="range" class="op" data-op="${id}" min="0" max="100" value="${op}" title="Transparencia">`;
  w.querySelector('input[type=checkbox]').onchange=e=>setLayer(id,e.target.checked);
  w.querySelector('input[type=range]').oninput=e=>setOpacity(id,+e.target.value);
  lay.appendChild(w);});
const bt=document.getElementById("btns");
VORDER.forEach(k=>{const b=document.createElement("button");b.textContent=VARS[k].label;b.dataset.k=k;b.onclick=()=>setColor(k);bt.appendChild(b);});
document.querySelectorAll(".base button").forEach(b=>b.onclick=()=>{const sat=b.dataset.b==="sat";
  map.setLayoutProperty("sat","visibility",sat?"visible":"none");map.setLayoutProperty("claro","visibility",sat?"none":"visible");
  document.querySelectorAll(".base button").forEach(x=>x.classList.toggle("on",x===b));});
document.getElementById("baseop").oninput=e=>{const o=+e.target.value/100;
  map.setPaintProperty("claro","raster-opacity",o);map.setPaintProperty("sat","raster-opacity",o);};

map.on("load",()=>{
  map.addSource("region",{type:"geojson",data:"/region_rv.geojson"});
  map.addLayer({id:"region-line",type:"line",source:"region",paint:{"line-color":"#0b3d66","line-width":1.6}});
  map.addSource("cu",{type:"geojson",data:"/cuencas.geojson"});
  map.addLayer({id:"cuencas-fill",type:"fill",source:"cu",layout:{visibility:"none"},
    paint:{"fill-color":(()=>{const e=["match",["get","NOM_CUEN"]];CUENCAS.forEach(([v,c])=>e.push(v,c));e.push("#bbb");return e;})(),"fill-opacity":0.35}});
  map.addLayer({id:"cuencas-line",type:"line",source:"cu",layout:{visibility:"none"},paint:{"line-color":"#33475a","line-width":0.7,"line-opacity":0.7}});
  map.addSource("hp",{type:"geojson",data:"/humedales_poly.geojson"});
  map.addLayer({id:"hpoly",type:"fill",source:"hp",paint:{"fill-color":colorExpr("p"),"fill-opacity":0.88,"fill-outline-color":"#12303f"}});
  map.addLayer({id:"hpoly-line",type:"line",source:"hp",paint:{"line-color":"#12303f","line-width":0.35}});
  setColor("p");
  const pop=new maplibregl.Popup({closeButton:true,maxWidth:"280px"});
  map.on("click","hpoly",e=>{const p=e.features[0].properties;
    pop.setLngLat(e.lngLat).setHTML(
      `<b>${p.n}</b><br>${p.c}${p.cu?" · Cuenca "+p.cu:""}<br>`+
      (p.t2?`Tipo de humedal: <b>${p.t2}</b><br>`:"")+
      `Percentil: <b>P${(+p.p).toFixed(0)}</b> · Acumulado ${(+p.mm).toFixed(0)} mm<br>`+
      `Amenaza de inundación: <b>${p.cl}</b><br>`+
      `Susceptibilidad ${(+p.s).toFixed(2)} · Retención suelo ${p.su!=null?(+p.su).toFixed(2):"s/d"}`+
      (p.se?`<br>Serie de suelo: <b>${p.se}</b>`:"")).addTo(map);});
  map.on("mouseenter","hpoly",()=>map.getCanvas().style.cursor="pointer");
  map.on("mouseleave","hpoly",()=>map.getCanvas().style.cursor="");
  // nombre de cuenca al pasar el cursor
  const cupop=new maplibregl.Popup({closeButton:false,closeOnClick:false,maxWidth:"240px"});
  map.on("mousemove","cuencas-fill",e=>{map.getCanvas().style.cursor="help";
    cupop.setLngLat(e.lngLat).setHTML(`<b>Cuenca:</b> ${e.features[0].properties.NOM_CUEN}`).addTo(map);});
  map.on("mouseleave","cuencas-fill",()=>{cupop.remove();map.getCanvas().style.cursor="";});
});
</script>
</body>
</html>
